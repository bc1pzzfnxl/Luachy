services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${DB_NAME:-luachy}
    # ports:
    #   - "5432:5432" # Uncomment to run drizzle-kit push locally
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgrespassword}@db:5432/${DB_NAME:-luachy}
      NODE_ENV: production
      LUACHY_USER: ${LUACHY_USER:-admin}
      LUACHY_PASSWORD: ${LUACHY_PASSWORD:-password123}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./assets:/app/assets
    networks:
      - internal
      - public

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_started
    networks:
      - public

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  pgdata:
